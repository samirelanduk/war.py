x-api-base: &api-base
  image: warpy-app
  restart: always
  env_file:
    - secrets.env
  environment: &api-environment
    DB_URL: "postgresql://warpy:warpy@postgres:5432/warpy"
    DEBUG: "yes"
  build:
    context: api
    dockerfile: Dockerfile
  volumes:
    - ./api:/app
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:17
    hostname: postgres
    container_name: warpy_postgres
    environment:
      POSTGRES_USER: "warpy"
      POSTGRES_PASSWORD: "warpy"
      POSTGRES_DB: "warpy"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warpy"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres:/var/lib/postgresql/data
  
  pgbackups:
    image: prodrigestivill/postgres-backup-local
    hostname: backups
    container_name: warpy_backups
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=warpy
      - POSTGRES_PASSWORD=warpy
      - POSTGRES_USER=warpy
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - ./backups:/backups
  
  upgrade:
    <<: *api-base
    hostname: upgrade
    container_name: warpy_upgrade
    command: python manage.py migrate
    deploy:
      restart_policy:
        condition: on-failure
  
  api:
    <<: *api-base
    hostname: api
    container_name: warpy_api
    ports:
      - "${API_PORT:-9001}:8000"
    command: ["gunicorn", "core.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3", "--reload", "--log-level", "debug"]
  
volumes:
  postgres: